name: u_vit3d_pose_sg

# Inherited from u_vit3d_pose
input_size: [64, 64]
channels: [128, 256, 576, 1152]
emb_channels: 1024
patch_size: 2
block_types: ["ResBlock", "ResBlock", "TransformerBlock", "TransformerBlock"]
block_dropouts: [0.0, 0.0, 0.1, 0.1]
num_updown_blocks: [3, 3, 6]
num_mid_blocks: 20
num_heads: 9
max_tokens: 2
pos_emb_type: rope
use_checkpointing: [false, false, false, true]
external_cond_dropout: 0.1
conditioning_type: ray_encoding
conditioning_dim: 180
use_causal_mask: False
use_repa: False
repa_z_dim: 768
repa_size: 32
use_vggt_alignment: false

# Scene graph conditioning params
n_object_types: 204
n_edge_types: 3
sg_use_gcn: true              # false = skip GCN, encode objects independently
sg_dim: 256
sg_clip_dim: 512
sg_text_encoder: clip             # "clip" or "minilm"
sg_type_embeddings_path: ""   # set to path of pre-computed sg_type_embeddings.pt
sg_gcn_layers: 3
sg_n_heads: 8
sg_d_head: 32
sg_dropout_prob: 0.1
sg_spatial_mode: center         # "center" | "bbox" | "bbox_surface" (bbox for objects + surface for walls)

# Wall conditioning (requires include_walls=true in dataset config)
include_walls: false
wall_height_default: 2.5       # fallback ceiling height if not in data
wall_thickness: 0.15           # assumed wall thickness for AABB

# Dense layout conditioning (HouseCrafter-style per-pixel layout maps)
use_dense_layout: false        # enable dense per-pixel layout injection
layout_embed_dim: 128          # dimension of per-pixel layout embedding
layout_injection_mode: additive  # "additive" (default) or "film" (FiLM modulation)
use_sparse_sg: true            # keep sparse SG (cross-attn/FiLM); false for ablation
use_layout_recon_loss: false   # enable layout reconstruction auxiliary loss head
layout_recon_mode: open_vocab  # "open_vocab" (cosine sim) or "closed_vocab" (cross-entropy)
