defaults:
  - wandb: local
  - dataset: spoc
  - model/encoder: epidiff
  - model/decoder: splatting_cuda
  - _self_

max_scenes: null
use_first_pool: false

lr: 2e-5

checkpoint_path: null
name: null
batch_size: 12
num_target: 1
wandb_every: 500

ctxt_min: 100
ctxt_max: 180

num_context: 1
nsamples: 2
render_length: 150

overfit_to_index: null

mode: "cond"
model_type: "dit"
feats_cond: false

depth_mode: depth
extended_visualization: false

sampling_type: "simple"
setting_name: "pixelsplat"
ngpus: 2
results_folder: "raw_results"

semantic_config: "splat_belief/config/semantic/onehot.yaml"
semantic_mode: "embed" # one_hot, embed
semantic_viz: "feat" # seg, query, feat

stage: train

resume_id: null
wandb_id: null

use_guidance: false
guidance_scale: 1.0
temperature: 1.0
sampling_steps: 50
train_num_steps: 550000
warmup_period: 10000
sample_every: 2000
save_every: 2000

ema_decay: 0.995
deterministic: False

use_depth_smoothness: False
use_lpips_loss: True

image_size: 64

start_idx: 0
end_idx: 50

use_abs_pose: False
test_autoregressive_stepsize: 40
scale_aug_ratio: 0
all_class: False 
seed: 0
use_dataset_pose: False
noise: 0.0
eval_10_frame: False  
rebuttal_indices: False 
load_pn: False
lock_pn_steps: 0

load_enc: False
# Component-only finetuning. Set finetune_component to one of:
#   encoder | depth_predictor | semantic_head
# and finetune_steps > 0 to freeze everything except that component for the
# first N steps; after step N, all parameters are unlocked.
finetune_component: null
finetune_steps: 0

# Open-vocab semantic head supervision mode. One of:
#   clip_patch_sampled  -- legacy: 15 random-scale CLIP image patches per view
#   class_text_only     -- per-pixel class-text targets (CLIP-text by default)
#   class_text_image    -- both: alpha * text + (1-alpha) * patch-CLIP-image
# The dense DINOv3 reg head on to_semantic_reg is independent of this and
# stays trained when use_reg_model=true regardless of this mode.
semantic_supervision_mode: clip_patch_sampled
# Path to a precomputed class-text embedding table (.pt). Required when
# semantic_supervision_mode in {class_text_only, class_text_image}. Produced
# by scripts/training/precompute_clip_text_targets.py. Must contain keys
# {name_to_id, id_to_name, embeddings (N+1, D)}; row 0 is the ignore vector.
class_text_table_path: null
# Text/image weighting for class_text_image mode. 1.0 → text-only, 0.0 →
# image-only, 0.5 weights both equally. Only used when mode is class_text_image.
class_text_image_alpha: 0.5

# Diffusion sampler. Options:
#   ddim          -- legacy: DDIM at sampling_steps timesteps (default 50)
#   dpm_solver_pp -- DPM-Solver++(2M) order-2 multistep, ~3-5x faster at same quality
#                    with sampling_steps=15 vs ddim sampling_steps=50.
sampler: ddim

# Inference precision. Wraps model.sample() in torch.autocast.
#   fp32 -- default; weights and ops in float32
#   bf16 -- bfloat16 autocast on H100 / A100; same dynamic range as fp32, ~1.5-2x faster
#   fp16 -- float16 autocast; narrower range, prefer bf16 if both are available
inference_dtype: fp32

load_optimizer: False

# Diffusion data space. The default preserves the original RGB pixel-space
# model; set diffusion_space=latents and model/encoder=latent_uvitmvsplat for
# VAE latent diffusion.
diffusion_space: pixels
latent:
  enabled: false
  channels: 4
  downsample_factor: 8
  scale_factor: 0.18215
  vae_name: stabilityai/sd-vae-ft-ema
  vae_path: null
  mode: online
  batch_size: 8
  dtype: fp32
  return_depth: true
  target_latent_loss_weight: 1.0
  target_rgb_loss_weight: 0.1
  context_latent_loss_weight: 1.0
  context_rgb_loss_weight: 0.1
  intermediate_latent_loss_weight: 1.0
  intermediate_rgb_loss_weight: 0.1

use_identity: True
ctxt_losses_factor: 1.0

inference_sample_from_dataset: False
inference_indices: null
inference_num_samples: 12
inference_min_frames: 20
inference_max_frames: 30
inference_save_scene: False

history_frames: 5

st_n_head: 1
st_n_layer: 3

clean_target: False
intermediate: True
num_intermediate: 3
use_history: True

use_object_binary_mask: False
background_weight: 0.1

# Object permanence guidance for temporal inference. See
# docs/object_permanence_guidance.md.
obj_permanence_mode: none
obj_permanence_state_t_min: 0
obj_permanence_mask_blur: 0
obj_permanence_mask_threshold: 0.5
obj_permanence_erode_kernel: 11
dps_guidance_scale: 1.0
dps_pos_weight: 1.0
dps_opacity_weight: 0.5

repa_encoder_resolution: 1024
# REPA encoder name. Format: <type>-<arch>-<size>, e.g. dinov2-vit-b, dinov3-vit-b.
# Supported types: dinov2, dinov2_reg, dinov3.
repa_encoder_name: dinov2-vit-b
# Optional path to local DINOv3 weights (.pth). Leave null to download from torch.hub.
repa_encoder_weights: null

clevr_first_frame_prob: 0.1
clevr_start_frame_id: 1

adjacent_angle: 0.523 # pi/6
# adjacent_angle: 0.785 # pi/4
adjacent_distance: 1.0 # in meters

use_depth_supervision: True

alignment: 
  apply_unnormalize_recon: True 
  alignment_context_length: 2 # number of frames to use for repa loss
  # vggt_layer_index: -1 
  # encoder_info: [1, 1374, 2048]
  # VGGT-1B last-layer patch grid for 518x518 input, patch_size 14:
  # 37x37 = 1369 patches, each 2048-dim. Required by REPA cosine alignment
  # against the un-pooled last transformer layer of VGGT.
  encoder_info: [2048, 37, 37]
  mid_channels: 128
  latents_info: null

# Online Gaussian refinement (Splat-SLAM-inspired test-time optimization)
refiner:
  enabled: false
  num_iterations: 30
  lr_means: 1.6e-4
  lr_harmonics: 2.5e-3
  lr_opacity: 0.05
  lr_scaling: 1.0e-3
  lr_rotation: 1.0e-3
  rgb_loss_weight: 1.0
  use_ssim: false
  ssim_weight: 0.2
  window_size: 10
  depth_consistency_weight: 0.0
  depth_consistency_use_log: true
  position_update_mode: ray
  ray_tangent_weight: 1.0
  ray_min_depth: 1.0e-4
  # Regularization
  prior_weight: 0.1
  freeze_geometry: false
  harmonics_dc_only: true
  min_observations: 2
  # LR decay
  use_lr_decay: true
  lr_means_final: 1.6e-6
  # Visibility masking
  use_visibility_masking: true
  visibility_margin: 0.05
  # Densification
  densify_every: 150
  densify_grad_threshold: 0.0002
  opacity_prune_threshold: 0.7
  size_prune_threshold: 0.1

agent:
  camera: ${dataset.camera}
  save_scene: False
  key_frame_interval: 8
  max_num_traj: 3
  step_size: 0.1
